name: Deploy Production

on:
  workflow_dispatch:

env:
  PRODUCTION_APP_BASE_URL: ${{ vars.PRODUCTION_APP_BASE_URL || 'https://jon2050.de/conspectus/webapp/' }}
  WEBSITE_REPO_FULL_NAME: ${{ vars.WEBSITE_REPO_FULL_NAME || 'Jon2050/Jon2050_Webpage' }}
  PRODUCTION_SMOKE_MAX_ATTEMPTS: '24'
  PRODUCTION_SMOKE_RETRY_DELAY_SECONDS: '10'
  PRODUCTION_SMOKE_SKIP_SECURITY_HEADER_CHECKS: 'true'

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != 'main' ]; then
            echo "This workflow must be started from the main branch." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve current main commit target
        id: target
        run: |
          set -euo pipefail
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Resolve successful Quality run for current main commit
        id: quality_run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_COMMIT_SHA: ${{ steps.target.outputs.commit_sha }}
        run: |
          set -euo pipefail

          quality_run_id=''
          page='1'

          while :; do
            runs_status="$(curl -sS -o workflow-runs-response.json -w '%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/quality.yml/runs?branch=main&event=push&head_sha=${TARGET_COMMIT_SHA}&per_page=100&page=${page}")"

            if [ "${runs_status}" != '200' ]; then
              echo "Failed to query Quality workflow runs." >&2
              cat workflow-runs-response.json >&2 || true
              exit 1
            fi

            workflow_run_count="$(jq '.workflow_runs | length' workflow-runs-response.json)"
            if [ "${workflow_run_count}" -eq '0' ]; then
              break
            fi

            while IFS= read -r candidate_run_id; do
              [ -n "${candidate_run_id}" ] || continue
              quality_run_id="${candidate_run_id}"
              break
            done < <(jq -r '.workflow_runs[] | select(.conclusion == "success") | .id' workflow-runs-response.json)

            if [ -n "${quality_run_id}" ]; then
              break
            fi

            if [ "${workflow_run_count}" -lt '100' ]; then
              break
            fi

            page="$((page + 1))"
          done

          if [ -z "${quality_run_id}" ]; then
            echo "No successful Quality run was found for current main commit ${TARGET_COMMIT_SHA}." >&2
            exit 1
          fi

          echo "quality_run_id=${quality_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build production artifact
        env:
          DEPLOY_CHANNEL: production
        run: npm run build

      - name: Verify production build output paths and scope
        run: >-
          node scripts/verify-build-channel.mjs
          --dist dist
          --channel production
          --base /conspectus/webapp/

      - name: Resolve production handoff identity
        id: handoff
        run: |
          build_time_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          artifact_name="conspectus-mobile-production-${{ steps.target.outputs.commit_sha }}"
          {
            echo "artifact_name=${artifact_name}"
            echo "build_time_utc=${build_time_utc}"
          } >> "${GITHUB_OUTPUT}"

      - name: Add production artifact metadata
        run: |
          cat > dist/deploy-metadata.json <<EOF
          {
            "channel": "production",
            "basePath": "/conspectus/webapp/",
            "sourceBranch": "main",
            "commitSha": "${{ steps.target.outputs.commit_sha }}",
            "buildTimeUtc": "${{ steps.handoff.outputs.build_time_utc }}",
            "qualityRunId": "${{ steps.quality_run.outputs.quality_run_id }}",
            "deployRunId": "${{ github.run_id }}"
          }
          EOF

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.handoff.outputs.artifact_name }}
          if-no-files-found: error
          retention-days: 90
          path: dist

      - name: Verify production handoff outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          artifacts_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifacts_status="$(curl -sS -o artifacts-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "${artifacts_api_url}")"

          if [ "${artifacts_status}" != '200' ]; then
            echo "Failed to list run artifacts for production handoff verification." >&2
            echo "Artifacts API status: ${artifacts_status}" >&2
            cat artifacts-response.json >&2 || true
            exit 1
          fi

          node scripts/verify-production-handoff.mjs \
            --artifacts-json artifacts-response.json \
            --metadata dist/deploy-metadata.json \
            --artifact-name "${{ steps.handoff.outputs.artifact_name }}" \
            --commit-sha "${{ steps.target.outputs.commit_sha }}" \
            --quality-run-id "${{ steps.quality_run.outputs.quality_run_id }}" \
            --deploy-run-id "${{ github.run_id }}" \
            --source-branch main

      - name: Read production deploy metadata
        id: metadata
        run: |
          set -euo pipefail
          {
            echo "commit_sha=$(jq -r '.commitSha' dist/deploy-metadata.json)"
            echo "deploy_run_id=$(jq -r '.deployRunId' dist/deploy-metadata.json)"
            echo "quality_run_id=$(jq -r '.qualityRunId' dist/deploy-metadata.json)"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify website consumer handoff contract
        env:
          DISPATCH_TOKEN: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "Missing required secret WEBSITE_REPO_DISPATCH_TOKEN." >&2
            echo "This token must be scoped to read ${WEBSITE_REPO_FULL_NAME} workflow contents and trigger repository_dispatch." >&2
            exit 1
          fi

          workflow_api_url="https://api.github.com/repos/${WEBSITE_REPO_FULL_NAME}/contents/.github/workflows/deploy.yml?ref=master"
          workflow_status="$(curl -sS -L -o website-deploy-workflow.json -w '%{http_code}' \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "${workflow_api_url}")"

          if [ "${workflow_status}" != '200' ]; then
            echo "Failed to read website deploy workflow from ${WEBSITE_REPO_FULL_NAME}." >&2
            echo "Workflow API status: ${workflow_status}" >&2
            cat website-deploy-workflow.json >&2 || true
            exit 1
          fi

          node scripts/verify-website-consumer-contract.mjs \
            --workflow-json website-deploy-workflow.json \
            --producer-repo "${GITHUB_REPOSITORY}"

      - name: Trigger deterministic website handoff event
        env:
          DISPATCH_TOKEN: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          cat > dispatch-payload.json <<EOF
          {
            "event_type": "conspectus-mobile-production-ready",
            "client_payload": {
              "commitSha": "${{ steps.metadata.outputs.commit_sha }}",
              "deployRunId": "${{ steps.metadata.outputs.deploy_run_id }}",
              "qualityRunId": "${{ steps.metadata.outputs.quality_run_id }}",
              "artifactName": "${{ steps.handoff.outputs.artifact_name }}"
            }
          }
          EOF

          dispatch_status="$(curl -sS -o dispatch-response.txt -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${WEBSITE_REPO_FULL_NAME}/dispatches" \
            --data-binary @dispatch-payload.json)"

          if [ "${dispatch_status}" != '204' ]; then
            echo "Failed to dispatch production-ready event to ${WEBSITE_REPO_FULL_NAME}." >&2
            echo "Dispatch API status: ${dispatch_status}" >&2
            cat dispatch-response.txt >&2 || true
            exit 1
          fi

          echo "Dispatched conspectus-mobile-production-ready to ${WEBSITE_REPO_FULL_NAME}."

      - name: Run production deployment smoke checks
        run: >-
          node scripts/verify-production-deploy-smoke.mjs
          --base-url "${{ env.PRODUCTION_APP_BASE_URL }}"
          --commit-sha "${{ steps.metadata.outputs.commit_sha }}"
          --deploy-run-id "${{ steps.metadata.outputs.deploy_run_id }}"
          --max-attempts ${{ env.PRODUCTION_SMOKE_MAX_ATTEMPTS }}
          --retry-delay-seconds ${{ env.PRODUCTION_SMOKE_RETRY_DELAY_SECONDS }}
          --request-timeout-ms 10000
          --skip-security-header-checks ${{ env.PRODUCTION_SMOKE_SKIP_SECURITY_HEADER_CHECKS }}
