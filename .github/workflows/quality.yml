name: Quality

on:
  pull_request:
  push:

env:
  VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}

concurrency:
  group: quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-code-changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only PR changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" != 'pull_request' ]; then
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            echo "Non-PR event detected; running full quality checks."
            exit 0
          fi

          if [ -z "${BASE_SHA}" ] || [ -z "${HEAD_SHA}" ]; then
            echo "Unable to resolve PR base/head SHAs; running full quality checks."
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if [ -z "${changed_files}" ]; then
            echo "code_changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changed files detected; treating PR as docs-only."
            exit 0
          fi

          code_changed='false'
          while IFS= read -r file; do
            if [ -z "${file}" ]; then
              continue
            fi

            case "${file}" in
              docs/*|*.md)
                ;;
              *)
                code_changed='true'
                break
                ;;
            esac
          done <<EOF
          ${changed_files}
          EOF

          echo "code_changed=${code_changed}" >> "${GITHUB_OUTPUT}"
          if [ "${code_changed}" = 'false' ]; then
            echo "Docs-only PR detected; lint/typecheck/tests/build jobs will be skipped."
          fi

  lint-typecheck:
    needs:
      - detect-code-changes
    if: needs.detect-code-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: |
          mkdir -p reports/vitest
          set -o pipefail
          npx vitest run --config vite.config.ts --reporter=default --reporter=junit --outputFile=reports/vitest/junit-app.xml | tee reports/vitest/vitest-app.log
          npx vitest run --config vitest.scripts.config.ts --reporter=default --reporter=junit --outputFile=reports/vitest/junit-scripts.xml | tee reports/vitest/vitest-scripts.log

      - name: Build and verify production channel paths/scope
        env:
          DEPLOY_CHANNEL: production
        run: |
          npm run build
          node scripts/verify-build-channel.mjs --dist dist --channel production --base /conspectus/webapp/

      - name: Upload production dist for e2e smoke
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          if-no-files-found: error
          path: dist

      - name: Build and verify preview channel paths/scope
        env:
          DEPLOY_CHANNEL: preview
          DEPLOY_PREVIEW_SLUG: quality-smoke
          DEPLOY_PREVIEW_BASE_PREFIX: /${{ github.event.repository.name }}
        run: |
          npm run build
          node scripts/verify-build-channel.mjs --dist dist --channel preview --base "/${{ github.event.repository.name }}/previews/quality-smoke/"

      - name: Upload unit test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-failure-artifacts
          if-no-files-found: ignore
          path: |
            reports/vitest/

  e2e-smoke:
    needs:
      - detect-code-changes
      - lint-typecheck
    if: needs.detect-code-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p \"require('@playwright/test/package.json').version\")" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Download production dist for e2e smoke
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: .

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run E2E smoke tests
        env:
          PLAYWRIGHT_WEB_SERVER_BUILD: '0'
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/
