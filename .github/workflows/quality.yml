name: Quality

on:
  push:
    branches-ignore:
      - gh-pages

env:
  VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: quality-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit
    uses: ./.github/workflows/dependency-audit.yml
    permissions:
      contents: read

  detect-code-changes:
    name: Detect Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect relevant branch changes
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before || '' }}
          AFTER_SHA: ${{ github.sha }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          compare_base=''
          compare_target="${AFTER_SHA}"

          if [ "${CURRENT_BRANCH}" = "${DEFAULT_BRANCH}" ]; then
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = '0000000000000000000000000000000000000000' ]; then
              echo "code_changed=true" >> "${GITHUB_OUTPUT}"
              echo "Unable to resolve previous commit SHA on ${DEFAULT_BRANCH}; running full quality checks."
              exit 0
            fi

            if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              echo "code_changed=true" >> "${GITHUB_OUTPUT}"
              echo "Previous commit SHA is unavailable locally on ${DEFAULT_BRANCH}; running full quality checks."
              exit 0
            fi

            compare_base="${BEFORE_SHA}"
            echo "Comparing default-branch push delta ${compare_base}..${compare_target}."
          else
            default_branch_ref="refs/remotes/origin/${DEFAULT_BRANCH}"

            if ! git show-ref --verify --quiet "${default_branch_ref}"; then
              git fetch --no-tags origin "${DEFAULT_BRANCH}:${default_branch_ref}"
            fi

            if ! git cat-file -e "${default_branch_ref}^{commit}" 2>/dev/null; then
              echo "code_changed=true" >> "${GITHUB_OUTPUT}"
              echo "Unable to resolve ${default_branch_ref}; running full quality checks."
              exit 0
            fi

            if ! compare_base="$(git merge-base "${default_branch_ref}" "${AFTER_SHA}")"; then
              echo "code_changed=true" >> "${GITHUB_OUTPUT}"
              echo "Unable to resolve the merge-base against ${DEFAULT_BRANCH}; running full quality checks."
              exit 0
            fi

            if [ -z "${compare_base}" ]; then
              echo "code_changed=true" >> "${GITHUB_OUTPUT}"
              echo "Merge-base against ${DEFAULT_BRANCH} is empty; running full quality checks."
              exit 0
            fi

            echo "Comparing branch delta ${compare_base}..${compare_target} against ${DEFAULT_BRANCH}."
          fi

          if ! changed_files="$(git diff --name-only "${compare_base}" "${compare_target}")"; then
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            echo "Unable to compute changed files; running full quality checks."
            exit 0
          fi

          if [ -z "${changed_files}" ]; then
            echo "code_changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changed files detected; treating push as docs-only."
            exit 0
          fi

          code_changed='false'
          while IFS= read -r file; do
            if [ -z "${file}" ]; then
              continue
            fi

            case "${file}" in
              docs/*|*.md)
                ;;
              *)
                code_changed='true'
                break
                ;;
            esac
          done <<EOF
          ${changed_files}
          EOF

          echo "code_changed=${code_changed}" >> "${GITHUB_OUTPUT}"
          if [ "${code_changed}" = 'false' ]; then
            echo "Docs-only branch delta detected; lint/typecheck/tests/build jobs will be skipped."
          fi

  lint-typecheck:
    name: Format, Lint, Typecheck, and Dead Code
    needs:
      - detect-code-changes
    if: >-
      needs.detect-code-changes.outputs.code_changed == 'true' &&
      github.ref_name != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check dead code
        run: npm run check:dead-code

  unit-tests:
    name: Unit Tests
    needs:
      - detect-code-changes
    if: >-
      needs.detect-code-changes.outputs.code_changed == 'true' &&
      github.ref_name != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prepare unit test report directories
        run: mkdir -p reports/vitest

      - name: Run app unit tests
        run: |
          set -o pipefail
          npx vitest run --config vite.config.ts --reporter=default --reporter=junit --outputFile=reports/vitest/junit-app.xml | tee reports/vitest/vitest-app.log

      - name: Run script unit tests
        run: |
          set -o pipefail
          npx vitest run --config vitest.scripts.config.ts --reporter=default --reporter=junit --outputFile=reports/vitest/junit-scripts.xml | tee reports/vitest/vitest-scripts.log

      - name: Publish unit test report summary
        if: always()
        run: >-
          node scripts/publish-test-summary.mjs
          --title "Unit Test Report"
          --files reports/vitest/junit-app.xml reports/vitest/junit-scripts.xml

  build:
    name: Build App (Preview)
    needs:
      - detect-code-changes
    if: needs.detect-code-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build app (preview)
        env:
          DEPLOY_CHANNEL: preview
          DEPLOY_PREVIEW_SLUG: ${{ github.ref_name == 'main' && 'main' || 'test' }}
          DEPLOY_PREVIEW_BASE_PREFIX: /${{ github.event.repository.name }}
        run: npm run build

      - name: Enforce JS/CSS bundle size budgets
        run: npm run check:bundle-size

      - name: Verify preview build output paths and scope
        run: >-
          node scripts/verify-build-channel.mjs
          --dist dist
          --channel preview
          --base "/${{ github.event.repository.name }}/previews/${{ github.ref_name == 'main' && 'main' || 'test' }}/"

      - name: Upload preview build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-preview-dist
          if-no-files-found: error
          include-hidden-files: true
          path: dist
          retention-days: 7

  e2e-tests:
    name: E2E Critical Journeys (${{ matrix.project }})
    needs:
      - detect-code-changes
      - build
    if: needs.detect-code-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(github.ref_name == github.event.repository.default_branch && '["chromium"]' || '["chromium", "pixel-5"]') }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate required runtime env
        run: |
          if [ -z "${VITE_AZURE_CLIENT_ID}" ]; then
            echo "Missing repository variable VITE_AZURE_CLIENT_ID." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          playwright_version="$(node -p "require('@playwright/test/package.json').version")"
          echo "version=${playwright_version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Download preview build artifact for E2E critical journeys
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: quality-preview-dist
          path: dist

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Prepare e2e report directories
        run: mkdir -p reports/playwright

      - name: Run E2E critical journeys
        env:
          PLAYWRIGHT_APP_BASE_PATH: /${{ github.event.repository.name }}/previews/${{ github.ref_name == 'main' && 'main' || 'test' }}/
          PLAYWRIGHT_WEB_SERVER_BUILD: '0'
        run: |
          if [ "${GITHUB_REF_NAME}" = "${{ github.event.repository.default_branch }}" ]; then
            npx playwright test tests/e2e/critical-user-journeys.spec.ts --project="${{ matrix.project }}"
          else
            npm run test:e2e -- --project="${{ matrix.project }}"
          fi

      - name: Upload Playwright failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-diagnostics-${{ matrix.project }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            playwright-report
            test-results
            reports/playwright/junit.xml
          retention-days: 7

      - name: Publish e2e test report summary
        if: always()
        run: >-
          node scripts/publish-test-summary.mjs
          --title "E2E Test Report (${{ matrix.project }})"
          --files reports/playwright/junit.xml

  quality-gate:
    name: Quality Gate
    needs:
      - dependency-audit
      - detect-code-changes
      - lint-typecheck
      - unit-tests
      - build
      - e2e-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify Quality pipeline results
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          CODE_CHANGED: ${{ needs.detect-code-changes.outputs.code_changed }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          DETECT_RESULT: ${{ needs.detect-code-changes.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          LINT_RESULT: ${{ needs.lint-typecheck.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
        run: |
          set -euo pipefail

          if [ "${DETECT_RESULT}" != 'success' ]; then
            echo "Detect Relevant Changes did not succeed (result=${DETECT_RESULT})." >&2
            exit 1
          fi

          if [ "${DEPENDENCY_AUDIT_RESULT}" != 'success' ]; then
            echo "Dependency Audit did not succeed (result=${DEPENDENCY_AUDIT_RESULT})." >&2
            exit 1
          fi

          if [ "${CODE_CHANGED}" = 'false' ]; then
            echo "Docs-only branch delta detected; heavy Quality jobs were intentionally skipped."
            exit 0
          fi

          if [ "${GITHUB_REF_NAME}" = "${{ github.event.repository.default_branch }}" ]; then
            if [ "${BUILD_RESULT}" != 'success' ] || [ "${E2E_RESULT}" != 'success' ]; then
              echo "Post-merge build or Chromium smoke did not succeed (build=${BUILD_RESULT}, e2e=${E2E_RESULT})." >&2
              exit 1
            fi
            echo "Protected main merge completed the exact-SHA build verification and Chromium critical-journey smoke."
            exit 0
          fi

          while IFS=':' read -r job_name job_result; do
            if [ "${job_result}" != 'success' ]; then
              echo "${job_name} did not succeed (result=${job_result})." >&2
              exit 1
            fi
          done <<EOF
          Format, Lint, and Typecheck:${LINT_RESULT}
          Unit Tests:${UNIT_RESULT}
          Build App (Preview):${BUILD_RESULT}
          E2E Critical Journeys:${E2E_RESULT}
          EOF

          echo "Quality pipeline completed successfully."
