name: Publish Production Artifact

on:
  workflow_run:
    workflows:
      - Quality
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  publish-production-artifact:
    name: Publish Main Production Artifact
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Confirm trigger commit is still the current main tip
        id: branch-head
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          branch_status="$(curl -sS -o branch-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/branches/main")"

          if [ "${branch_status}" != '200' ]; then
            echo "Failed to resolve the current main branch tip." >&2
            cat branch-response.json >&2 || true
            exit 1
          fi

          current_main_head_sha="$(jq -r '.commit.sha // empty' branch-response.json)"
          if [ -z "${current_main_head_sha}" ]; then
            echo 'Unable to read the current main branch tip SHA.' >&2
            cat branch-response.json >&2 || true
            exit 1
          fi

          is_current_main_head='false'
          if [ "${current_main_head_sha}" = "${HEAD_SHA}" ]; then
            is_current_main_head='true'
          else
            echo "Quality run commit ${HEAD_SHA} is stale for main; current main tip is ${current_main_head_sha}. Skipping production artifact publication."
          fi

          {
            echo "current_main_head_sha=${current_main_head_sha}"
            echo "is_current_main_head=${is_current_main_head}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout source commit
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Build production artifact
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        env:
          DEPLOY_CHANNEL: production
        run: npm run build

      - name: Verify production build output paths and scope
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        run: >-
          node scripts/verify-build-channel.mjs
          --dist dist
          --channel production
          --base /conspectus/webapp/

      - name: Resolve production handoff identity
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        id: handoff
        run: |
          build_time_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          artifact_name="conspectus-mobile-production-${{ github.event.workflow_run.head_sha }}"
          {
            echo "artifact_name=${artifact_name}"
            echo "build_time_utc=${build_time_utc}"
          } >> "${GITHUB_OUTPUT}"

      - name: Add production artifact metadata
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        run: |
          cat > dist/deploy-metadata.json <<EOF
          {
            "channel": "production",
            "basePath": "/conspectus/webapp/",
            "sourceBranch": "${{ github.event.workflow_run.head_branch }}",
            "commitSha": "${{ github.event.workflow_run.head_sha }}",
            "buildTimeUtc": "${{ steps.handoff.outputs.build_time_utc }}",
            "qualityRunId": "${{ github.event.workflow_run.id }}",
            "deployRunId": "${{ github.run_id }}"
          }
          EOF

      - name: Upload production artifact
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.handoff.outputs.artifact_name }}
          if-no-files-found: error
          retention-days: 90
          path: dist

      - name: Verify production handoff outputs
        if: steps.branch-head.outputs.is_current_main_head == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          artifacts_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifacts_status="$(curl -sS -o artifacts-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "${artifacts_api_url}")"

          if [ "${artifacts_status}" != '200' ]; then
            echo "Failed to list run artifacts for production handoff verification." >&2
            echo "Artifacts API status: ${artifacts_status}" >&2
            cat artifacts-response.json >&2 || true
            exit 1
          fi

          node scripts/verify-production-handoff.mjs \
            --artifacts-json artifacts-response.json \
            --metadata dist/deploy-metadata.json \
            --artifact-name "${{ steps.handoff.outputs.artifact_name }}" \
            --commit-sha "${{ github.event.workflow_run.head_sha }}" \
            --quality-run-id "${{ github.event.workflow_run.id }}" \
            --deploy-run-id "${{ github.run_id }}" \
            --source-branch main
