name: Publish Production Artifact

on:
  workflow_run:
    workflows:
      - Quality
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  publish-production-artifact:
    name: Publish Main Production Artifact
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Detect reusable production artifact
        id: source-artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUALITY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          artifacts_status="$(curl -sS -o quality-artifacts-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${QUALITY_RUN_ID}/artifacts")"

          if [ "${artifacts_status}" != '200' ]; then
            echo "Failed to query Quality artifacts for run ${QUALITY_RUN_ID}." >&2
            cat quality-artifacts-response.json >&2 || true
            exit 1
          fi

          production_artifact_count="$(jq '[.artifacts[] | select(.name == "quality-production-dist" and .expired == false)] | length' quality-artifacts-response.json)"
          has_production_artifact='false'
          if [ "${production_artifact_count}" -gt '0' ]; then
            has_production_artifact='true'
          fi

          echo "has_production_artifact=${has_production_artifact}" >> "${GITHUB_OUTPUT}"

          if [ "${has_production_artifact}" = 'false' ]; then
            echo "No reusable production artifact found on Quality run ${QUALITY_RUN_ID}; skipping production artifact publication."
          fi

      - name: Checkout source commit
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download production dist from Quality
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        uses: actions/download-artifact@v5
        with:
          name: quality-production-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve production handoff identity
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        id: handoff
        run: |
          build_time_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          artifact_name="conspectus-mobile-production-${{ github.event.workflow_run.head_sha }}"
          {
            echo "artifact_name=${artifact_name}"
            echo "build_time_utc=${build_time_utc}"
          } >> "${GITHUB_OUTPUT}"

      - name: Add production artifact metadata
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        run: |
          cat > dist/deploy-metadata.json <<EOF
          {
            "channel": "production",
            "basePath": "/conspectus/webapp/",
            "sourceBranch": "${{ github.event.workflow_run.head_branch }}",
            "commitSha": "${{ github.event.workflow_run.head_sha }}",
            "buildTimeUtc": "${{ steps.handoff.outputs.build_time_utc }}",
            "qualityRunId": "${{ github.event.workflow_run.id }}",
            "deployRunId": "${{ github.run_id }}"
          }
          EOF

      - name: Upload production artifact
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.handoff.outputs.artifact_name }}
          if-no-files-found: error
          retention-days: 90
          path: dist

      - name: Verify production handoff outputs
        if: steps.source-artifact.outputs.has_production_artifact == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          artifacts_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifacts_status="$(curl -sS -o artifacts-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "${artifacts_api_url}")"

          if [ "${artifacts_status}" != '200' ]; then
            echo "Failed to list run artifacts for production handoff verification." >&2
            echo "Artifacts API status: ${artifacts_status}" >&2
            cat artifacts-response.json >&2 || true
            exit 1
          fi

          node scripts/verify-production-handoff.mjs \
            --artifacts-json artifacts-response.json \
            --metadata dist/deploy-metadata.json \
            --artifact-name "${{ steps.handoff.outputs.artifact_name }}" \
            --commit-sha "${{ github.event.workflow_run.head_sha }}" \
            --quality-run-id "${{ github.event.workflow_run.id }}" \
            --deploy-run-id "${{ github.run_id }}" \
            --source-branch main
