# Runs the high-severity dependency gate for pull requests, scheduled monitoring, and Quality.
name: Dependency Audit

on:
  workflow_call:
  pull_request:
  schedule:
    - cron: '17 3 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Fail on high or critical dependency vulnerabilities
        run: npm run audit:dependencies
