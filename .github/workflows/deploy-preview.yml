name: Deploy Preview

on:
  workflow_run:
    workflows:
      - Quality
    types:
      - completed

env:
  PREVIEW_SMOKE_MAX_ATTEMPTS: '18'
  PREVIEW_SMOKE_RETRY_DELAY_SECONDS: '10'

permissions:
  actions: read
  contents: read
  pages: read

concurrency:
  group: deploy-preview-${{ github.event.workflow_run.head_branch == 'main' && 'main' || 'test' }}
  cancel-in-progress: true

jobs:
  prepare-context:
    name: Prepare Preview Context
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      branch_name: ${{ steps.context.outputs.branch_name }}
      current_branch_head_sha: ${{ steps.branch-head.outputs.current_branch_head_sha }}
      deployment_environment: ${{ steps.context.outputs.deployment_environment }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      is_current_branch_head: ${{ steps.branch-head.outputs.is_current_branch_head }}
      preview_base_path: ${{ steps.context.outputs.preview_base_path }}
      preview_url: ${{ steps.context.outputs.preview_url }}
      preview_slot: ${{ steps.context.outputs.preview_slot }}
      has_preview_artifact: ${{ steps.artifact.outputs.has_preview_artifact }}
    steps:
      - name: Resolve deployment context
        id: context
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          preview_slot='test'
          if [ "${BRANCH_NAME}" = 'main' ]; then
            preview_slot='main'
          fi

          deployment_environment="preview-${preview_slot}"
          preview_base_path="/${REPO_NAME}/previews/${preview_slot}/"
          preview_url="https://${GITHUB_REPOSITORY_OWNER}.github.io${preview_base_path}"

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "deployment_environment=${deployment_environment}"
            echo "head_sha=${HEAD_SHA}"
            echo "preview_base_path=${preview_base_path}"
            echo "preview_url=${preview_url}"
            echo "preview_slot=${preview_slot}"
          } >> "${GITHUB_OUTPUT}"

      - name: Confirm trigger commit is still the current branch tip
        id: branch-head
        env:
          BRANCH_NAME: ${{ steps.context.outputs.branch_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
        run: |
          set -euo pipefail

          encoded_branch="$(printf '%s' "${BRANCH_NAME}" | jq -sRr @uri)"
          branch_status="$(curl -sS -o branch-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/branches/${encoded_branch}")"

          if [ "${branch_status}" = '404' ]; then
            {
              echo 'current_branch_head_sha='
              echo 'is_current_branch_head=false'
            } >> "${GITHUB_OUTPUT}"
            echo "Branch ${BRANCH_NAME} no longer exists; skipping preview deployment."
            exit 0
          fi

          if [ "${branch_status}" != '200' ]; then
            echo "Failed to resolve current branch tip for ${BRANCH_NAME}." >&2
            cat branch-response.json >&2 || true
            exit 1
          fi

          current_branch_head_sha="$(jq -r '.commit.sha // empty' branch-response.json)"
          if [ -z "${current_branch_head_sha}" ]; then
            echo "Unable to read the current branch tip SHA for ${BRANCH_NAME}." >&2
            cat branch-response.json >&2 || true
            exit 1
          fi

          is_current_branch_head='false'
          if [ "${current_branch_head_sha}" = "${HEAD_SHA}" ]; then
            is_current_branch_head='true'
          else
            echo "Quality run commit ${HEAD_SHA} is stale for ${BRANCH_NAME}; current branch tip is ${current_branch_head_sha}. Skipping preview deployment."
          fi

          {
            echo "current_branch_head_sha=${current_branch_head_sha}"
            echo "is_current_branch_head=${is_current_branch_head}"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect reusable preview artifact
        id: artifact
        if: steps.branch-head.outputs.is_current_branch_head == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUALITY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          artifacts_status="$(curl -sS -o artifacts-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${QUALITY_RUN_ID}/artifacts")"

          if [ "${artifacts_status}" != '200' ]; then
            echo "Failed to query Quality artifacts for run ${QUALITY_RUN_ID}." >&2
            cat artifacts-response.json >&2 || true
            exit 1
          fi

          preview_artifact_count="$(jq '[.artifacts[] | select(.name == "quality-preview-dist" and .expired == false)] | length' artifacts-response.json)"
          has_preview_artifact='false'
          if [ "${preview_artifact_count}" -gt '0' ]; then
            has_preview_artifact='true'
          fi

          echo "has_preview_artifact=${has_preview_artifact}" >> "${GITHUB_OUTPUT}"

          if [ "${has_preview_artifact}" = 'false' ]; then
            echo "No reusable preview artifact found on Quality run ${QUALITY_RUN_ID}; skipping preview deployment."
          fi

  deploy-preview:
    name: Deploy Preview
    needs:
      - prepare-context
    if: >-
      needs.prepare-context.outputs.is_current_branch_head == 'true' &&
      needs.prepare-context.outputs.has_preview_artifact == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      deployments: write
      pages: read
    env:
      DEPLOYMENT_ENVIRONMENT: ${{ needs.prepare-context.outputs.deployment_environment }}
      DEPLOYMENT_LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PREVIEW_URL: ${{ needs.prepare-context.outputs.preview_url }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-context.outputs.head_sha }}

      - name: Download preview dist from Quality
        uses: actions/download-artifact@v5
        with:
          name: quality-preview-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create deployment record
        id: deployment
        env:
          BRANCH_NAME: ${{ needs.prepare-context.outputs.branch_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.prepare-context.outputs.head_sha }}
        run: |
          set -euo pipefail

          create_payload="$(jq -nc \
            --arg description "Preview deployment for ${BRANCH_NAME}" \
            --arg environment "${DEPLOYMENT_ENVIRONMENT}" \
            --arg ref "${HEAD_SHA}" \
            '{
              ref: $ref,
              environment: $environment,
              description: $description,
              transient_environment: true,
              production_environment: false,
              auto_merge: false,
              required_contexts: []
            }')"

          create_status="$(curl -sS -o deployment-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments" \
            -d "${create_payload}")"

          if [ "${create_status}" != '201' ]; then
            echo "Failed to create deployment record for ${HEAD_SHA}." >&2
            cat deployment-response.json >&2 || true
            exit 1
          fi

          deployment_id="$(jq -r '.id // empty' deployment-response.json)"
          if [ -z "${deployment_id}" ]; then
            echo "Deployment creation response did not include an id." >&2
            cat deployment-response.json >&2 || true
            exit 1
          fi

          echo "deployment_id=${deployment_id}" >> "${GITHUB_OUTPUT}"

          in_progress_payload="$(jq -nc \
            --arg description 'Publishing preview deployment.' \
            --arg environment "${DEPLOYMENT_ENVIRONMENT}" \
            --arg environment_url "${PREVIEW_URL}" \
            --arg log_url "${DEPLOYMENT_LOG_URL}" \
            '{
              state: "in_progress",
              environment: $environment,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }')"

          status_code="$(curl -sS -o deployment-status-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
            -d "${in_progress_payload}")"

          if [ "${status_code}" != '201' ]; then
            echo "Failed to mark deployment ${deployment_id} as in progress." >&2
            cat deployment-status-response.json >&2 || true
            exit 1
          fi

      - name: Publish preview to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          destination_dir: previews/${{ needs.prepare-context.outputs.preview_slot }}
          keep_files: true
          full_commit_message: >-
            deploy(preview): ${{ needs.prepare-context.outputs.branch_name }}
            (${{ needs.prepare-context.outputs.head_sha }})

      - name: Verify preview deployment availability
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          pages_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          pages_status="$(curl -sS -o pages-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "${pages_api_url}")"

          if [ "${pages_status}" != '200' ]; then
            echo "GitHub Pages site is not configured/available for this repository." >&2
            echo "Pages API status: ${pages_status}" >&2
            cat pages-response.json >&2 || true
            exit 1
          fi

          preview_index_url="${PREVIEW_URL}index.html"
          max_attempts="${PREVIEW_SMOKE_MAX_ATTEMPTS}"
          retry_delay_seconds="${PREVIEW_SMOKE_RETRY_DELAY_SECONDS}"

          if ! [[ "${max_attempts}" =~ ^[1-9][0-9]*$ ]]; then
            echo "PREVIEW_SMOKE_MAX_ATTEMPTS must be a positive integer; got '${max_attempts}'." >&2
            exit 1
          fi

          if ! [[ "${retry_delay_seconds}" =~ ^[0-9]+$ ]]; then
            echo "PREVIEW_SMOKE_RETRY_DELAY_SECONDS must be a non-negative integer; got '${retry_delay_seconds}'." >&2
            exit 1
          fi

          for attempt in $(seq 1 "${max_attempts}"); do
            preview_status="$(curl -sS -L -o preview-index.html -w '%{http_code}' "${preview_index_url}")"
            if [ "${preview_status}" = '200' ] && grep -q 'id="app"' preview-index.html; then
              echo "Preview deployment is reachable at ${PREVIEW_URL}"
              exit 0
            fi

            if [ "${attempt}" -lt "${max_attempts}" ]; then
              echo "Preview check attempt ${attempt}/${max_attempts} not ready (status ${preview_status}); retrying in ${retry_delay_seconds}s..."
              sleep "${retry_delay_seconds}"
            fi
          done

          echo "Preview deployment did not become reachable in time: ${PREVIEW_URL}" >&2
          echo "Last response status: ${preview_status}" >&2
          cat preview-index.html >&2 || true
          exit 1

      - name: Mark deployment success
        if: success() && steps.deployment.outputs.deployment_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          success_payload="$(jq -nc \
            --arg description 'Preview deployment is reachable.' \
            --arg environment "${DEPLOYMENT_ENVIRONMENT}" \
            --arg environment_url "${PREVIEW_URL}" \
            --arg log_url "${DEPLOYMENT_LOG_URL}" \
            '{
              state: "success",
              environment: $environment,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }')"

          status_code="$(curl -sS -o deployment-success-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses" \
            -d "${success_payload}")"

          if [ "${status_code}" != '201' ]; then
            echo "Failed to mark deployment ${{ steps.deployment.outputs.deployment_id }} as successful." >&2
            cat deployment-success-response.json >&2 || true
            exit 1
          fi

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.deployment_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          failure_payload="$(jq -nc \
            --arg description 'Preview deployment failed.' \
            --arg environment "${DEPLOYMENT_ENVIRONMENT}" \
            --arg environment_url "${PREVIEW_URL}" \
            --arg log_url "${DEPLOYMENT_LOG_URL}" \
            '{
              state: "failure",
              environment: $environment,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }')"

          status_code="$(curl -sS -o deployment-failure-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses" \
            -d "${failure_payload}")"

          if [ "${status_code}" != '201' ]; then
            echo "Failed to mark deployment ${{ steps.deployment.outputs.deployment_id }} as failed." >&2
            cat deployment-failure-response.json >&2 || true
            exit 1
          fi

      - name: Mark deployment inactive on cancellation
        if: cancelled() && steps.deployment.outputs.deployment_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cancelled_payload="$(jq -nc \
            --arg description 'Preview deployment was cancelled.' \
            --arg environment "${DEPLOYMENT_ENVIRONMENT}" \
            --arg environment_url "${PREVIEW_URL}" \
            --arg log_url "${DEPLOYMENT_LOG_URL}" \
            '{
              state: "inactive",
              environment: $environment,
              environment_url: $environment_url,
              log_url: $log_url,
              description: $description
            }')"

          status_code="$(curl -sS -o deployment-cancelled-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments/${{ steps.deployment.outputs.deployment_id }}/statuses" \
            -d "${cancelled_payload}")"

          if [ "${status_code}" != '201' ]; then
            echo "Failed to mark deployment ${{ steps.deployment.outputs.deployment_id }} as inactive after cancellation." >&2
            cat deployment-cancelled-response.json >&2 || true
            exit 1
          fi

      - name: Preview URL (reachable)
        run: |
          echo "Preview URL: ${PREVIEW_URL}"
